<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>履歷表</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .header {
      display: flex;
      align-items: center;
      border-bottom: 2px solid #eee;
      padding-bottom: 15px;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 20px;
      border: 3px solid #333;
    }

    .info h1 {
      margin: 0;
      font-size: 28px;
    }

    .info p {
      margin: 5px 0;
      color: #555;
    }

    .section {
      margin-top: 20px;
    }

    .section h2 {
      border-left: 5px solid #333;
      padding-left: 10px;
      color: #333;
    }

    .section p {
      color: #666;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 15px;
      background: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background: #555;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="images/photo.jpg" alt="個人照片" class="profile-img">
      <div class="info">
        <h1>土豆油</h1>
        <p>學號: 114014073</p>
        <p>Email: pinjjj0218@gmail.com</p>
      </div>
    </div>

    <div class="section">
      <h2>自我介紹</h2>
      <p id="intro">我是土豆油，一位認真負責的學生，對學習與未來充滿熱情。</p>
      <button class="btn" onclick="changeIntro()">換一句自我介紹</button>
    </div>

    <div class="section">
      <h2>技能</h2>
      <p>HTML / CSS / JavaScript 基礎</p>
    </div>

    <div class="section">
      <h2>聯絡方式</h2>
      <p>歡迎透過 Email 與我聯繫！</p>
    </div>
  </div>

  <script>
    function changeIntro() {
      const intros = [
        "我是一位熱愛學習新技術的學生。",
        "我喜歡挑戰與解決問題。",
        "我希望未來能在專業領域發光發熱。"
      ];

      const randomIndex = Math.floor(Math.random() * intros.length);
      document.getElementById("intro").innerText = intros[randomIndex];
    }
  </script>

</body>
</html>
