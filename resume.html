<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>履歷表</title>
  <style>
    body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #dfe9f3, #ffffff);
  margin: 0;
  padding: 40px 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #ffffff;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* 上方區塊 */
.header {
  display: flex;
  align-items: center;
  padding: 30px;
  background: #2c3e50;
  color: white;
}

/* 照片 */
.profile-img {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  object-fit: cover;
  margin-right: 25px;
  border: 4px solid white;
}

/* 名字資訊 */
.info h1 {
  margin: 0;
  font-size: 30px;
}

.info p {
  margin: 5px 0;
  color: #ddd;
}

/* 內容區 */
.section {
  padding: 20px 30px;
  border-bottom: 1px solid #eee;
}

/* 標題 */
.section h2 {
  margin-bottom: 10px;
  color: #2c3e50;
  position: relative;
}

.section h2::after {
  content: "";
  width: 40px;
  height: 3px;
  background: #2c3e50;
  position: absolute;
  left: 0;
  bottom: -5px;
}

/* 文字 */
.section p {
  color: #555;
  line-height: 1.8;
}

/* 按鈕 */
.btn {
  margin-top: 15px;
  padding: 10px 18px;
  background: #2c3e50;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #1a252f;
  transform: translateY(-2px);
}
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="images/photo.jpg" alt="個人照片" class="profile-img">
      <div class="info">
        <h1>土豆油</h1>
        <p>學號: 114014073</p>
        <p>Email: pinjjj0218@gmail.com</p>
      </div>
    </div>

    <div class="section">
      <h2>自我介紹</h2>
      <p id="intro">我是土豆油，一位認真負責的學生，對學習與未來充滿熱情。</p>
      <button class="btn" onclick="changeIntro()">換一句自我介紹</button>
    </div>

    <div class="section">
      <h2>技能</h2>
      <p>HTML / CSS / JavaScript 基礎</p>
    </div>

    <div class="section">
      <h2>聯絡方式</h2>
      <p>歡迎透過 Email 與我聯繫！</p>
    </div>
  </div>

  <script>
   var select = function(s) {
  return document.querySelector(s);
}

function randomBetween(min,max)
{
    var number = Math.floor(Math.random()*(max-min+1)+min);
  
    if ( number !== 0 ){
      return number;
    }else {
      return 0.5;
    }
}

var tl = new TimelineMax();

for(var i = 0; i < 20; i++){

  var t = TweenMax.to(select('.bubble' + i), randomBetween(1, 1.5), {
    x: randomBetween(12, 15) * (randomBetween(-1, 1)),
    y: randomBetween(12, 15) * (randomBetween(-1, 1)), 
    repeat:-1,
    repeatDelay:randomBetween(0.2, 0.5),
    yoyo:true,
    ease:Elastic.easeOut.config(1, 0.5)
  })

  tl.add(t, (i+1)/0.6)
}

tl.seek(50);
  </script>

</body>
</html>
